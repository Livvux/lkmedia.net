<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000">
  <defs>
    <radialGradient id="bg" cx="400" cy="380" r="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a2a3a"/>
      <stop offset="55%" stop-color="#061418"/>
      <stop offset="100%" stop-color="#040c10"/>
    </radialGradient>
    <radialGradient id="glow" cx="400" cy="380" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3090c0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3090c0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <circle cx="400" cy="380" r="320" fill="url(#glow)"/>
  <!-- Outer ring -->
  <circle cx="400" cy="380" r="280" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.22"/>
  <!-- Inner ring -->
  <circle cx="400" cy="380" r="180" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.12"/>
  <!-- Scan lines -->
  <line x1="0" y1="130" x2="800" y2="130" stroke="#ffffff" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="260" x2="800" y2="260" stroke="#ffffff" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="390" x2="800" y2="390" stroke="#ffffff" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="520" x2="800" y2="520" stroke="#ffffff" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="650" x2="800" y2="650" stroke="#ffffff" stroke-width="0.5" opacity="0.08"/>
  <!-- Cross vertical -->
  <rect x="376" y="180" width="48" height="400" rx="4" fill="#ffffff" opacity="0.14"/>
  <rect x="376" y="180" width="48" height="400" rx="4" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.28"/>
  <!-- Cross horizontal -->
  <rect x="200" y="356" width="400" height="48" rx="4" fill="#ffffff" opacity="0.14"/>
  <rect x="200" y="356" width="400" height="48" rx="4" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.28"/>
</svg>
